<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Someone Special ✨</title>
    <style>
        :root {
            --primary-pink: #ff3366;
            --glow-pink: #ff6b8e;
            --gold-accent: #d4af37;
            --dark-bg: #0a0015;
            --glass-bg: rgba(255, 255, 255, 0.07);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f001a, #1a0033, #2a004d, #0f001a);
            background-size: 300% 300%;
            animation: luxuryGradient 18s ease infinite;
            color: #fff;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        @keyframes luxuryGradient {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        header {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(10, 0, 21, 0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 12px;
            text-align: center;
            z-index: 1000;
            border-bottom: 1px solid rgba(212, 175, 55, 0.15);
        }

        header p {
            color: var(--gold-accent);
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-shadow: 0 0 12px rgba(212, 175, 55, 0.6);
        }

        .page {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: translateY(30px);
            transition: all 1.2s cubic-bezier(0.22, 1, 0.36, 1);
            padding: 20px;
            text-align: center;
            pointer-events: none;
        }

        .page.active {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 28px;
            background: linear-gradient(90deg, #fff, var(--glow-pink), #fff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px rgba(255, 51, 102, 0.4);
            animation: textShine 6s ease-in-out infinite;
        }

        @keyframes textShine {
            0%,100% { background-position: -200% 0; }
            100%    { background-position: 200% 0; }
        }

        .photo-frame {
            width: 300px;
            height: 400px;
            border: 2px solid rgba(212, 175, 55, 0.4);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 
                0 20px 50px rgba(0,0,0,0.6),
                inset 0 0 30px rgba(255, 51, 102, 0.15),
                0 0 40px rgba(212, 175, 55, 0.2);
            background: #111;
            transition: all 0.8s cubic-bezier(0.22, 1, 0.36, 1);
            transform: scale(0.92);
            opacity: 0;
        }

        .page.active .photo-frame {
            transform: scale(1);
            opacity: 1;
        }

        .photo-frame:hover {
            transform: scale(1.04);
            box-shadow: 
                0 30px 70px rgba(0,0,0,0.7),
                0 0 60px rgba(255, 51, 102, 0.35);
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .btn {
            padding: 14px 48px;
            background: linear-gradient(135deg, var(--primary-pink), #e02e5c);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.15rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(255, 51, 102, 0.5);
            transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
            margin-top: 20px;
        }

        .btn:hover {
            transform: translateY(-4px) scale(1.06);
            box-shadow: 0 15px 40px rgba(255, 51, 102, 0.7);
            background: linear-gradient(135deg, #ff4d82, var(--primary-pink));
        }

        /* Glassmorphism Envelope */
        .card-container {
            perspective: 1400px;
            margin: 40px 0;
            cursor: pointer;
        }

        .envelope {
            width: 280px;
            height: 180px;
            position: relative;
            transform-style: preserve-3d;
            transition: all 1.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .envelope.open {
            transform: rotateX(20deg) translateY(30px);
        }

        .flap {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 50%;
            background: linear-gradient(to bottom, #b32d52, #8c1f3f);
            border-radius: 12px 12px 0 0;
            transform-origin: top;
            transition: transform 1.4s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .envelope.open .flap {
            transform: rotateX(-140deg);
        }

        .letter {
            position: absolute;
            inset: 10px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(212, 175, 55, 0.25);
            border-radius: 16px;
            color: #eee;
            padding: 24px;
            font-size: 1rem;
            line-height: 1.6;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.4);
            transform: translateY(40px);
            transition: all 1.4s cubic-bezier(0.23, 1, 0.32, 1);
            opacity: 0.9;
        }

        .envelope.open .letter {
            transform: translateY(-80px) rotateX(10deg);
            opacity: 1;
        }

        /* Video */
        #final-video {
            width: 92%;
            max-width: 560px;
            border-radius: 24px;
            box-shadow: 0 0 60px rgba(255, 51, 102, 0.4);
            border: 2px solid rgba(212, 175, 55, 0.3);
        }

        /* Premium Floating Elements */
        .heart {
            position: fixed;
            color: var(--glow-pink);
            font-size: 24px;
            pointer-events: none;
            z-index: -1;
            user-select: none;
            text-shadow: 0 0 15px var(--primary-pink);
            animation: floatLux 7s linear infinite;
            opacity: 0;
        }

        @keyframes floatLux {
            0%   { transform: translateY(110vh) scale(0.6) rotate(0deg); opacity: 0; }
            10%  { opacity: 0.9; }
            100% { transform: translateY(-20vh) scale(1.1) rotate(720deg); opacity: 0; }
        }

        @media (max-width: 500px) {
            h1 { font-size: 1.7rem; }
            .photo-frame { width: 240px; height: 320px; }
            .btn { padding: 12px 40px; font-size: 1rem; }
        }
    </style>
</head>
<body>

    <header>
        <p>Made with ❤️ by sivasingh | Follow @smss1708</p>
    </header>

    <audio id="bgMusic" src="tere-liye.mp3" loop></audio>

    <div class="page active" id="p0">
        <h1>For You, My Special One ✨</h1>
        <button class="btn" onclick="startExperience()">Open with Love ❤️</button>
    </div>

    <!-- Photo pages (p1 to p10) -->
    <div class="page" id="p1"><img src="photo1.jpg" class="photo-frame"><button class="btn" onclick="nextPage(2)">Next ❤️</button></div>
    <div class="page" id="p2"><img src="photo2.jpg" class="photo-frame"><button class="btn" onclick="nextPage(3)">Next ❤️</button></div>
    <div class="page" id="p3"><img src="photo3.jpg" class="photo-frame"><button class="btn" onclick="nextPage(4)">Next ❤️</button></div>
    <div class="page" id="p4"><img src="photo4.jpg" class="photo-frame"><button class="btn" onclick="nextPage(5)">Next ❤️</button></div>
    <div class="page" id="p5"><img src="photo5.jpg" class="photo-frame"><button class="btn" onclick="nextPage(6)">Next ❤️</button></div>
    <div class="page" id="p6"><img src="photo6.jpg" class="photo-frame"><button class="btn" onclick="nextPage(7)">Next ❤️</button></div>
    <div class="page" id="p7"><img src="photo7.jpg" class="photo-frame"><button class="btn" onclick="nextPage(8)">Next ❤️</button></div>
    <div class="page" id="p8"><img src="photo8.jpg" class="photo-frame"><button class="btn" onclick="nextPage(9)">Next ❤️</button></div>
    <div class="page" id="p9"><img src="photo9.jpg" class="photo-frame"><button class="btn" onclick="nextPage(10)">Next ❤️</button></div>
    <div class="page" id="p10"><img src="photo10.jpg" class="photo-frame"><button class="btn" onclick="nextPage(11)">Next ❤️</button></div>

    <div class="page" id="p11">
        <h1>A Whisper from the Heart...</h1>
        <div class="card-container" onclick="toggleCard()">
            <div class="envelope" id="envelope">
                <div class="flap"></div>
                <div class="letter">
                    <p>"You are the rare kind of magic that lights up my darkest days.<br>Every second with you feels like a stolen luxury."</p>
                </div>
            </div>
        </div>
        <button class="btn" style="margin-top: 180px;" onclick="nextPage(12)">Continue ❤️</button>
    </div>

    <div class="page" id="p12">
        <h1>This is just to see your smile...</h1>
        <button class="btn" onclick="startVideoPage()">Unlock the Surprise ✨</button>
    </div>

    <div class="page" id="p13">
        <video id="final-video" controls>
            <source src="video1.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <p style="margin-top: 30px; font-size: 1.4rem; color: var(--gold-accent); text-shadow: 0 0 20px rgba(212,175,55,0.5);">Forever Yours ✨❤️</p>
    </div>

    <script>
        const music = document.getElementById('bgMusic');
        const video = document.getElementById('final-video');

        function nextPage(n) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('p' + n).classList.add('active');
        }

        function startExperience() {
            music.play().catch(() => {});
            nextPage(1);
            createLuxHearts();
        }

        function toggleCard() {
            document.getElementById('envelope').classList.toggle('open');
        }

        function startVideoPage() {
            nextPage(13);
            music.pause();
            video.play();
        }

        function createLuxHearts() {
            setInterval(() => {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.innerHTML = Math.random() > 0.7 ? '✨' : '❤️';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.animationDuration = (Math.random() * 5 + 6) + 's';
                heart.style.fontSize = (Math.random() * 18 + 18) + 'px';
                heart.style.animationDelay = Math.random() * 2 + 's';
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 8000);
            }, 600);
        }
    </script>
</body>
</html>
